  <text x="96" y="306" fill="#334155" font-family="Courier New, monospace" font-size="20">{</text>
  <text x="116" y="346" fill="#EF4444" font-family="Courier New, monospace" font-size="19">"content": "안녕 안녕"</text>
  <text x="116" y="382" fill="#64748B" font-family="Courier New, monospace" font-size="19">"role": "user"</text>
  <text x="96" y="420" fill="#334155" font-family="Courier New, monospace" font-size="20">}</text>
  <text x="96" y="478" fill="#F97316" font-family="Courier New, monospace" font-size="19">"type": "reasoning"</text>
  <text x="96" y="538" fill="#334155" font-family="Courier New, monospace" font-size="20">{</text>
  <text x="116" y="576" fill="#64748B" font-family="Courier New, monospace" font-size="19">"role": "assistant"</text>
  <text x="116" y="614" fill="#EF4444" font-family="Courier New, monospace" font-size="19">"text": "안녕하세요. 무엇을 도와드릴까요?"</text>
  <text x="96" y="652" fill="#334155" font-family="Courier New, monospace" font-size="20">}</text>
  <text x="96" y="724" fill="#EF4444" font-family="Courier New, monospace" font-size="19">"content": "아침에 일찍 일어나는 습관..."</text>

  <text x="1500" y="56" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="18">Deploy</text>

  <rect x="735" y="110" width="760" height="78" rx="14" fill="#F4F7FB"/>
  <rect x="756" y="130" width="40" height="40" rx="10" fill="#FF4A4A"/>
  <text x="770" y="158" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26">☺</text>
  <text x="812" y="158" fill="#111827" font-family="Arial, sans-serif" font-size="24">안녕 안녕</text>

  <rect x="735" y="214" width="760" height="204" rx="14" fill="#FFFFFF"/>
  <rect x="756" y="234" width="40" height="40" rx="10" fill="#FF9A1F"/>
  <text x="769" y="262" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24">✦</text>
  <text x="812" y="256" fill="#111827" font-family="Arial, sans-serif" font-size="24">안녕! 반가워요 — 어떻게 도와줄까?</text>
  <text x="812" y="292" fill="#374151" font-family="Arial, sans-serif" font-size="20">원하면 동기부여, 습관 만들기, 생산성, 목표 설정 중 하나 골라서 짧은 계획을 만들 수 있어.</text>
  <text x="812" y="348" fill="#374151" font-family="Arial, sans-serif" font-size="20">지금 바로 해볼 간단한 한 가지:</text>
  <text x="852" y="388" fill="#374151" font-family="Arial, sans-serif" font-size="20">1. 오늘 가장 작은 목표 하나 정하기</text>
  <text x="852" y="422" fill="#374151" font-family="Arial, sans-serif" font-size="20">2. 10분만 집중하기</text>
  <text x="852" y="456" fill="#374151" font-family="Arial, sans-serif" font-size="20">3. 끝나면 바로 체크하기</text>

  <rect x="735" y="454" width="760" height="78" rx="14" fill="#F4F7FB"/>
  <rect x="756" y="474" width="40" height="40" rx="10" fill="#FF4A4A"/>
  <text x="770" y="502" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26">☺</text>
  <text x="812" y="502" fill="#111827" font-family="Arial, sans-serif" font-size="24">아침에 일찍 일어나는 습관을 기르려면?</text>

  <rect x="735" y="558" width="760" height="58" rx="14" fill="#FFFFFF"/>
  <rect x="756" y="568" width="40" height="40" rx="10" fill="#FF9A1F"/>
  <text x="769" y="596" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24">✦</text>
  <text x="812" y="596" fill="#111827" font-family="Arial, sans-serif" font-size="22">🔧 Life Coach used tool:</text>
  <text x="1120" y="596" fill="#16A34A" font-family="Courier New, monospace" font-size="22">web_search</text>
  <text x="812" y="632" fill="#6B7280" font-family="Arial, sans-serif" font-size="18">query: "how to wake up early circadian rhythm sleep"</text>

  <rect x="735" y="646" width="760" height="224" rx="14" fill="#FFFFFF"/>
  <rect x="756" y="666" width="40" height="40" rx="10" fill="#FF9A1F"/>
  <text x="769" y="694" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24">✦</text>
  <text x="812" y="690" fill="#111827" font-family="Arial, sans-serif" font-size="24">좋아요 — 실용적인 계획부터 바로 드릴게요.</text>
  <text x="812" y="728" fill="#374151" font-family="Arial, sans-serif" font-size="20">[웹 검색: "wake up early sleep hygiene circadian rhythm"]</text>
  <text x="812" y="770" fill="#374151" font-family="Arial, sans-serif" font-size="20">1. 기상 시간을 먼저 고정합니다.</text>
  <text x="812" y="804" fill="#374151" font-family="Arial, sans-serif" font-size="20">2. 취침 시간을 15~30분씩 천천히 앞당깁니다.</text>
  <text x="812" y="838" fill="#374151" font-family="Arial, sans-serif" font-size="20">3. 아침 햇빛과 저녁 루틴을 같이 맞춥니다.</text>

  <rect x="760" y="900" width="700" height="58" rx="12" fill="#F8FAFC" stroke="#FCA5A5" stroke-width="2"/>
  <text x="790" y="936" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="20">Write a message for your assistant</text>
  <rect x="1420" y="911" width="26" height="26" rx="13" fill="#E5E7EB"/>
  <text x="1427" y="930" fill="#6B7280" font-family="Arial, sans-serif" font-size="20">↑</text>
</svg>
